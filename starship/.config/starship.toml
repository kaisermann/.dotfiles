# Starship prompt configuration
# Lean and minimal, inspired by Tide's lean mode

format = """$directory $git_branch$git_state$git_status$nodejs$rust$python$docker_context$cmd_duration$line_break$character"""

# Don't add a blank line between prompts
add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 0
fish_style_pwd_dir_length = 1
truncate_to_repo = true
style = "cyan"
repo_root_style = "bold cyan"
repo_root_format = "[$before_root_path]($style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"

[git_branch]
format = "[$branch(:$remote_branch)]($style) "
style = "bold purple"
truncation_length = 24
truncation_symbol = "…"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[git_status]
format = '($conflicted$stashed$deleted$renamed$modified$typechanged$staged$untracked$ahead_behind)'
conflicted = "[=${count}](bold red) "
stashed = "[*${count}](bold cyan) "
deleted = "[✘${count}](bold red) "
renamed = "[»${count}](bold purple) "
modified = "[!${count}](bold yellow) "
typechanged = "[!${count}](bold yellow) "
staged = "[+${count}](bold green) "
untracked = "[?${count}](bold blue) "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count}⇣${behind_count} "
style = ""

[nodejs]
format = "[$version]($style) "
detect_extensions = []
detect_files = ["package.json"]
detect_folders = []

[rust]
format = "[$version]($style) "

[python]
format = "[$version]($style) "

[docker_context]
format = "[$context]($style) "

[cmd_duration]
min_time = 3000
format = "[$duration]($style) "
style = "bold yellow"
